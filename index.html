const todayStr = () => new Date().toISOString().split('T')[0];

// ── Task urgency helper ──
function getUrgency(dueDate, isChecked) {
  if (!dueDate || isChecked) return 'none';
  const diff = daysBetween(todayStr(), dueDate);
  if (diff < 0) return 'overdue';
  if (diff === 0) return 'today';
  if (diff <= 7) return 'week';
  return 'none';
}

// ── Compute all tasks with due dates for a closing property ──
function getAllTasksWithDates(property) {
  const type = property.type || 'Seller';
  const sections = CLOSING_CHECKLIST_SECTIONS[type] || CLOSING_CHECKLIST_SECTIONS.Seller;
  const checkedItems = property.checkedItems || {};
  const tasks = [];
  sections.forEach((sec, si) => {
    sec.items.forEach((item, ii) => {
      const anchorVal = property[item.anchor];
      const dueDate = anchorVal ? addDays(anchorVal, item.offset) : null;
      const isChecked = !!checkedItems[`${si}-${ii}`];
      const urg = getUrgency(dueDate, isChecked);
      tasks.push({
        propertyId: property.id,
        address: property.address || 'Unknown',
        name: property.name || '',
        section: sec.section,
        sectionIdx: si,
        itemIdx: ii,
        label: item.label,
        anchor: item.anchor,
        dueDate,
        isChecked,
        urgency: urg,
      });
    });
  });
  return tasks;
}

// ── Shared Components ──
function FieldInput({ field, value, onChange, disabled }) {
  const base = "w-full px-3 py-1.5 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white";
  const dis = disabled ? "bg-gray-50 text-gray-500 cursor-not-allowed" : "";
  if (field.type==='textarea') return <textarea value={value||''} onChange={e=>onChange(field.key,e.target.value)} disabled={disabled} className={`${base} ${dis}`} rows={2}/>;
  if (field.type==='select') return <select value={value||''} onChange={e=>onChange(field.key,e.target.value)} disabled={disabled} className={`${base} ${dis}`}>{field.options.map(o=><option key={o} value={o}>{o||'—'}</option>)}</select>;
  return <input type={field.type} value={value||''} onChange={e=>onChange(field.key,e.target.value)} disabled={disabled} className={`${base} ${dis}`}/>;
}

// ── Closing Checklist with conditional formatting ──
function ClosingChecklistSection({ property, onUpdate }) {
  const type = property.type||'Seller';
  const sections = CLOSING_CHECKLIST_SECTIONS[type]||CLOSING_CHECKLIST_SECTIONS.Seller;
  const checked = property.checkedItems||{};
  const toggle = (si,ii) => {
    const key=`${si}-${ii}`;
    onUpdate({...property, checkedItems:{...checked,[key]:!checked[key]}});
  };
  return (
    <div className="space-y-4 mt-4">{sections.map((sec,si)=>{
      const total=sec.items.length;
      const done=sec.items.filter((_,ii)=>checked[`${si}-${ii}`]).length;
      const pct=total>0?Math.round((done/total)*100):0;
      return (
        <div key={si} className="bg-white rounded-xl border border-gray-200 p-4">
          <div className="flex items-center justify-between mb-2">
            <h4 className="font-semibold text-gray-800">{sec.section}</h4>
            <span className="text-xs text-gray-400">{done}/{total} ({pct}%)</span>
          </div>
          <div className="progress-bar mb-3"><div className="progress-fill" style={{width:`${pct}%`,background:pct===100?'#22c55e':'#3b82f6'}}/></div>
          <div className="space-y-1">{sec.items.map((item,ii)=>{
            const isChecked=!!checked[`${si}-${ii}`];
            const anchorVal=property[item.anchor];
            const dueDate=anchorVal?addDays(anchorVal,item.offset):null;
            const urg=getUrgency(dueDate,isChecked);
            return (
              <label key={ii} className={`flex items-start gap-2 py-1.5 px-2 rounded-lg cursor-pointer transition-colors ${isChecked?'opacity-50':urgencyClass[urg]} hover:opacity-80`}>
                <input type="checkbox" checked={isChecked} onChange={()=>toggle(si,ii)} className="mt-0.5"/>
                <div className="flex-1 min-w-0">
                  <span className={`text-sm ${isChecked?'line-through text-gray-400':'text-gray-700'}`}>{item.label}</span>
                </div>
                {dueDate && (
                  <span className={`text-xs whitespace-nowrap font-medium ${isChecked?'text-gray-300':urgencyColor[urg]}`}>
                    {urg==='overdue'&&!isChecked?'OVERDUE ':''}{fmtShort(dueDate)}
                  </span>
                )}
              </label>
            );
          })}</div>
        </div>
      );
    })}</div>
  );
}

  const [preListings, setPreListings] = useState(()=>load('re_prelistings',IMPORTED_PRE_LISTINGS));
  const [activeListings, setActiveListings] = useState(()=>load('re_active',IMPORTED_ACTIVE_LISTINGS));
  const [closings, setClosings] = useState(()=>load('re_closings',IMPORTED_CLOSINGS));
  const [tab, setTab] = useState('dashboard');
  const [viewingId, setViewingId] = useState(null);
  const [viewCtx, setViewCtx] = useState(null);

  useEffect(()=>{save('re_prelistings',preListings);},[preListings]);
  useEffect(()=>{save('re_active',activeListings);},[activeListings]);
  useEffect(()=>{save('re_closings',closings);},[closings]);

  const updatePre = (u) => setPreListings(prev=>prev.map(p=>p.id===u.id?u:p));
  const updateActive = (u) => setActiveListings(prev=>prev.map(p=>p.id===u.id?u:p));
  const updateClosing = (u) => setClosings(prev=>prev.map(p=>p.id===u.id?u:p));

  const addListing = () => { const n={id:uid(),createdAt:Date.now()}; setPreListings(prev=>[n,...prev]); setViewingId(n.id); setViewCtx('pre'); };

  const moveToActive = (id) => {
    const p=preListings.find(x=>x.id===id); if(!p) return;
    if(!confirm(`Move "${p.address||'this property'}" to Active Listings?`)) return;
    setPreListings(prev=>prev.filter(x=>x.id!==id));
    setActiveListings(prev=>[{...p,listDate:p.expectedLiveDate||todayStr(),weeklyLog:[]}, ...prev]);
    setTab('active');
  };
  const moveToClosing = (id) => {
    const p=activeListings.find(x=>x.id===id); if(!p) return;
    if(!confirm(`Move "${p.address||'this property'}" to Under Contract?`)) return;
    setActiveListings(prev=>prev.filter(x=>x.id!==id));
    setClosings(prev=>[{...p,type:'Seller',contractDate:todayStr(),checkedItems:{}}, ...prev]);
    setTab('closing');
  };

  const openView = (id,ctx) => { setViewingId(id); setViewCtx(ctx); };
  const closeView = () => { setViewingId(null); setViewCtx(null); };

  const handleDashboardNav = (target) => {
    if (target.startsWith('tab-')) { setTab(target.replace('tab-','')); return; }
    // Navigate to a specific closing property
    setViewingId(target); setViewCtx('closing'); setTab('closing');
  };

  const viewedProp = viewingId ? (
    viewCtx==='pre'?preListings.find(p=>p.id===viewingId):
    viewCtx==='active'?activeListings.find(p=>p.id===viewingId):
    closings.find(p=>p.id===viewingId)
  ) : null;

  const counts = { pre:preListings.length, active:activeListings.length, closing:closings.length };

  return (
    <div className="max-w-5xl mx-auto px-4 py-6">
      <div className="mb-6">
        <h1 className="text-2xl font-bold text-gray-900">Listing Manager</h1>
        <p className="text-sm text-gray-500">The Beth Sauer Team &middot; Keller Williams One Realty</p>
      </div>

      {!viewingId && (
        <div className="flex gap-6 border-b border-gray-200 mb-6 overflow-x-auto">
          {[
            {key:'dashboard',label:'Dashboard',icon:'M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4'},
            {key:'pre',label:'Pre-Listing',count:counts.pre,color:'bg-blue-100 text-blue-700'},
            {key:'active',label:'Active Listings',count:counts.active,color:'bg-green-100 text-green-700'},
            {key:'closing',label:'Under Contract',count:counts.closing,color:'bg-purple-100 text-purple-700'},
          ].map(t=>(
            <button key={t.key} onClick={()=>setTab(t.key)}
              className={`pb-3 px-1 text-sm flex items-center gap-2 whitespace-nowrap transition-colors ${tab===t.key?'tab-active':'text-gray-500 hover:text-gray-700'}`}>
              {t.icon && <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d={t.icon}/></svg>}
              {t.label}
              {t.count>0 && <span className={`badge ${t.color}`}>{t.count}</span>}
            </button>
          ))}
        </div>
      )}

      {viewingId && viewedProp ? (
        viewCtx==='closing' ? <ClosingDetailView property={viewedProp} onUpdate={updateClosing} onBack={closeView}/> :
        <PropertyForm property={viewedProp} fields={PRE_LISTING_FIELDS} onUpdate={viewCtx==='pre'?updatePre:updateActive} onBack={closeView}/>
      ) : (
        <>
          {tab==='dashboard' && <MainDashboard preListings={preListings} activeListings={activeListings} closings={closings} onNavigate={handleDashboardNav}/>}
          {tab==='pre' && <PreListingDashboard listings={preListings} onUpdate={updatePre} onView={id=>openView(id,'pre')} onAdd={addListing} onMoveToActive={moveToActive}/>}
          {tab==='active' && <ActiveListingsDashboard actives={activeListings} onUpdate={updateActive} onView={id=>openView(id,'active')} onMoveToClosing={moveToClosing}/>}
          {tab==='closing' && <ClosingsDashboard closings={closings} onUpdate={updateClosing} onView={id=>openView(id,'closing')}/>}
        </>
      )}
      <div className="mt-8 text-center text-xs text-gray-300">Data saved locally in your browser</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
